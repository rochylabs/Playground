name: Copilot Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

jobs:
  copilot-review:
    name: Copilot Review
    runs-on: ubuntu-latest
    steps:
      - name: Copilot Code Review
        uses: github/copilot-code-review-action@latest
